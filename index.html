<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Bodas de Ouro — Maria Lúcia & João</title>
<style>
  :root{
    --gold: #d4af6a;
    --gold-light: #f0d9a8;
    --bg: #0a0a08;
    --rec: #e0453f;
  }
  * { box-sizing: border-box; margin:0; padding:0; }
  html, body {
    height: 100%;
    background: var(--bg);
    font-family: Georgia, 'Times New Roman', serif;
    color: var(--gold-light);
    overflow: hidden;
  }
  body {
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }
  #stage {
    position: relative;
    width: 100vw;
    max-width: 480px;
    height: 100vh;
    max-height: 853px;
    aspect-ratio: 9/16;
    background:#000;
    overflow:hidden;
  }
  #video, #resultImg, #resultVideo {
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    object-fit: cover;
    background:#000;
  }
  #resultImg, #resultVideo { display:none; }
  #frameOverlay {
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    pointer-events:none;
    z-index: 5;
  }
  #topBar {
    position:absolute;
    top: max(14px, env(safe-area-inset-top));
    left:0; right:0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding: 0 16px;
    z-index: 10;
  }
  #status {
    font-size: 12px;
    letter-spacing: 0.05em;
    color: var(--gold);
    background: rgba(0,0,0,0.5);
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid rgba(212,175,106,0.4);
  }
  #status.recording { color: var(--rec); border-color: var(--rec); }
  #flipBtn {
    width:38px; height:38px;
    border-radius:50%;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(212,175,106,0.4);
    color: var(--gold);
    font-size: 18px;
    display:flex; align-items:center; justify-content:center;
  }
  #controls {
    position:absolute;
    bottom: max(28px, env(safe-area-inset-bottom));
    left:0; right:0;
    display:flex;
    justify-content:center;
    align-items:center;
    gap: 28px;
    z-index: 10;
  }
  #shutterWrap {
    position:relative;
    width:84px; height:84px;
    display:flex; align-items:center; justify-content:center;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }
  #ringSvg {
    position:absolute;
    top:0; left:0;
    width:84px; height:84px;
    transform: rotate(-90deg);
  }
  #ringSvg circle {
    fill:none;
    stroke-width:4;
  }
  #ringBg { stroke: rgba(255,255,255,0.15); }
  #ringProgress {
    stroke: var(--rec);
    stroke-linecap: round;
    stroke-dasharray: 226;
    stroke-dashoffset: 226;
    transition: stroke-dashoffset 0.05s linear;
  }
  #shutterBtn {
    width:72px; height:72px;
    border-radius:50%;
    background: transparent;
    border: 4px solid var(--gold);
    position:relative;
    transition: transform 0.15s ease;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }
  #shutterBtn::after{
    content:'';
    position:absolute;
    inset:6px;
    border-radius:50%;
    background: var(--gold-light);
    transition: border-radius 0.2s ease, background 0.2s ease;
  }
  #shutterBtn.recording { transform: scale(1.08); }
  #shutterBtn.recording::after{ border-radius: 14px; background: var(--rec); }

  #resultControls {
    position:absolute;
    bottom: max(28px, env(safe-area-inset-bottom));
    left:0; right:0;
    display:none;
    justify-content:center;
    gap: 16px;
    z-index: 10;
    padding: 0 24px;
  }
  .pillBtn {
    flex:1;
    max-width: 160px;
    padding: 14px 10px;
    border-radius: 30px;
    border: 1px solid var(--gold);
    background: rgba(0,0,0,0.55);
    color: var(--gold-light);
    font-size: 14px;
    letter-spacing: 0.03em;
    text-align:center;
    font-family: Georgia, serif;
  }
  .pillBtn.primary {
    background: var(--gold);
    color: #1a1400;
    font-weight: bold;
  }
  #permissionMsg {
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding: 40px;
    font-size: 15px;
    line-height:1.6;
    z-index: 20;
    background: var(--bg);
  }
  #loadingScreen {
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:18px;
    z-index: 30;
    background: var(--bg);
  }
  .spinner {
    width:40px; height:40px;
    border-radius:50%;
    border: 3px solid rgba(212,175,106,0.25);
    border-top-color: var(--gold);
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loadingScreen span {
    font-size: 13px;
    letter-spacing: 0.05em;
    color: var(--gold);
  }
  canvas { display:none; }
</style>
</head>
<body>

<div id="stage">
  <video id="video" autoplay playsinline muted></video>
  <img id="resultImg" alt="Foto capturada">
  <video id="resultVideo" playsinline loop controls></video>
  <img id="frameOverlay" src="frame.webp" alt="Moldura Bodas de Ouro">

  <div id="topBar">
    <div id="status">Bodas de Ouro · 18.07.2026</div>
    <button id="flipBtn" title="Trocar câmera">⟳</button>
  </div>

  <div id="controls">
    <div id="shutterWrap">
      <svg id="ringSvg" viewBox="0 0 84 84">
        <circle id="ringBg" cx="42" cy="42" r="36"></circle>
        <circle id="ringProgress" cx="42" cy="42" r="36"></circle>
      </svg>
      <button id="shutterBtn" title="Toque: foto · Segure: vídeo"></button>
    </div>
  </div>

  <div id="resultControls">
    <button class="pillBtn" id="retakeBtn">Refazer</button>
    <button class="pillBtn primary" id="shareBtn">Compartilhar</button>
    <button class="pillBtn" id="downloadBtn">Baixar</button>
  </div>

  <div id="permissionMsg" style="display:none;">
    Toque no botão abaixo para ativar a câmera e usar a moldura.
    <br><br>
    <button class="pillBtn primary" id="enableCamBtn" style="max-width:220px;margin-top:10px;">Ativar câmera</button>
  </div>

  <div id="loadingScreen">
    <div class="spinner"></div>
    <span>Carregando moldura...</span>
  </div>
</div>

<canvas id="canvas"></canvas>
<canvas id="recCanvas"></canvas>

<script>
const video = document.getElementById('video');
const resultImg = document.getElementById('resultImg');
const resultVideo = document.getElementById('resultVideo');
const frameImg = document.getElementById('frameOverlay');
const canvas = document.getElementById('canvas');
const recCanvas = document.getElementById('recCanvas');
const shutterBtn = document.getElementById('shutterBtn');
const shutterWrap = document.getElementById('shutterWrap');
const ringProgress = document.getElementById('ringProgress');
const controls = document.getElementById('controls');
const resultControls = document.getElementById('resultControls');
const retakeBtn = document.getElementById('retakeBtn');
const shareBtn = document.getElementById('shareBtn');
const downloadBtn = document.getElementById('downloadBtn');
const flipBtn = document.getElementById('flipBtn');
const permissionMsg = document.getElementById('permissionMsg');
const enableCamBtn = document.getElementById('enableCamBtn');
const statusEl = document.getElementById('status');
const loadingScreen = document.getElementById('loadingScreen');

let currentFacing = 'user'; // selfie por padrão, troque para 'environment' se preferir
let stream = null;
let capturedBlob = null;
let capturedType = null; // 'photo' | 'video'

let frameReady = false;
let cameraReady = false;

function tryHideLoading() {
  if (frameReady && cameraReady) {
    loadingScreen.style.display = 'none';
  }
}

if (frameImg.complete) {
  frameReady = true;
} else {
  frameImg.addEventListener('load', () => { frameReady = true; tryHideLoading(); });
  frameImg.addEventListener('error', () => { frameReady = true; tryHideLoading(); }); // não trava o app se a imagem falhar
}

async function startCamera(facing) {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
  }
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: facing,
        width: { ideal: 3840 },
        height: { ideal: 2160 }
      },
      audio: true
    });
    video.srcObject = stream;
    video.style.transform = facing === 'user' ? 'scaleX(-1)' : 'none';
    permissionMsg.style.display = 'none';

    const track = stream.getVideoTracks()[0];
    const capabilities = track.getCapabilities ? track.getCapabilities() : {};
    if (capabilities.zoom) {
      try {
        await track.applyConstraints({ advanced: [{ zoom: capabilities.zoom.min }] });
      } catch (e) { /* alguns navegadores não suportam ajustar, ignora */ }
    }

    cameraReady = true;
    tryHideLoading();
  } catch (err) {
    loadingScreen.style.display = 'none';
    permissionMsg.innerHTML = 'Não foi possível acessar a câmera.<br><br>Verifique as permissões do navegador e tente novamente.<br><br><button class="pillBtn primary" id="retryBtn" style="max-width:220px;margin-top:10px;">Tentar novamente</button>';
    permissionMsg.style.display = 'flex';
    document.getElementById('retryBtn').onclick = () => { permissionMsg.style.display='none'; loadingScreen.style.display='flex'; startCamera(currentFacing); };
  }
}

flipBtn.onclick = () => {
  currentFacing = currentFacing === 'user' ? 'environment' : 'user';
  startCamera(currentFacing);
};

// ---------- Helpers de enquadramento (cover-fit, sem esticar) ----------
function getCoverRect(vw, vh, targetW, targetH) {
  const videoRatio = vw / vh;
  const targetRatio = targetW / targetH;
  let sx, sy, sw, sh;
  if (videoRatio > targetRatio) {
    sh = vh; sw = vh * targetRatio; sx = (vw - sw) / 2; sy = 0;
  } else {
    sw = vw; sh = vw / targetRatio; sx = 0; sy = (vh - sh) / 2;
  }
  return { sx, sy, sw, sh };
}

function drawFrameToCtx(ctx, targetW, targetH) {
  const vw = video.videoWidth, vh = video.videoHeight;
  const { sx, sy, sw, sh } = getCoverRect(vw, vh, targetW, targetH);
  if (currentFacing === 'user') {
    ctx.save();
    ctx.translate(targetW, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, targetW, targetH);
    ctx.restore();
  } else {
    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, targetW, targetH);
  }
  if (frameReady) {
    ctx.drawImage(frameImg, 0, 0, targetW, targetH);
  }
}

// ---------- Foto ----------
function takePhoto() {
  const targetW = 1080, targetH = 1920;
  canvas.width = targetW;
  canvas.height = targetH;
  const ctx = canvas.getContext('2d');
  drawFrameToCtx(ctx, targetW, targetH);

  canvas.toBlob((blob) => {
    capturedBlob = blob;
    capturedType = 'photo';
    const url = URL.createObjectURL(blob);
    resultImg.src = url;
    resultImg.style.display = 'block';
    resultVideo.style.display = 'none';
    video.style.display = 'none';
    frameImg.style.display = 'none';
    controls.style.display = 'none';
    resultControls.style.display = 'flex';
  }, 'image/png', 0.95);
}

// ---------- Vídeo (segurar) ----------
const MAX_DURATION_MS = 15000;
let mediaRecorder = null;
let recordedChunks = [];
let recLoopId = null;
let recordStartTime = null;
let recordTimeout = null;
let isRecording = false;
let holdTimer = null;
const HOLD_THRESHOLD_MS = 250;

function startRecordLoop() {
  const targetW = 1080, targetH = 1920;
  recCanvas.width = targetW;
  recCanvas.height = targetH;
  const ctx = recCanvas.getContext('2d');
  function loop() {
    drawFrameToCtx(ctx, targetW, targetH);
    recLoopId = requestAnimationFrame(loop);
  }
  loop();
}

function stopRecordLoop() {
  if (recLoopId) cancelAnimationFrame(recLoopId);
  recLoopId = null;
}

function pickMimeType() {
  const options = ['video/mp4', 'video/webm;codecs=vp9,opus', 'video/webm;codecs=vp8,opus', 'video/webm'];
  for (const opt of options) {
    if (window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(opt)) {
      return opt;
    }
  }
  return '';
}

function startRecording() {
  isRecording = true;
  recordedChunks = [];
  startRecordLoop();

  const canvasStream = recCanvas.captureStream(30);
  const audioTracks = stream ? stream.getAudioTracks() : [];
  const combined = new MediaStream([
    ...canvasStream.getVideoTracks(),
    ...audioTracks
  ]);

  const mimeType = pickMimeType();
  try {
    mediaRecorder = mimeType ? new MediaRecorder(combined, { mimeType }) : new MediaRecorder(combined);
  } catch (e) {
    mediaRecorder = new MediaRecorder(combined);
  }

  mediaRecorder.ondataavailable = (e) => {
    if (e.data && e.data.size > 0) recordedChunks.push(e.data);
  };
  mediaRecorder.onstop = () => {
    stopRecordLoop();
    const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType || 'video/webm' });
    capturedBlob = blob;
    capturedType = 'video';
    const url = URL.createObjectURL(blob);
    resultVideo.src = url;
    resultVideo.style.display = 'block';
    resultVideo.play().catch(()=>{});
    resultImg.style.display = 'none';
    video.style.display = 'none';
    frameImg.style.display = 'none';
    controls.style.display = 'none';
    resultControls.style.display = 'flex';
    statusEl.classList.remove('recording');
    statusEl.textContent = 'Bodas de Ouro · 18.07.2026';
  };

  mediaRecorder.start();
  recordStartTime = performance.now();
  shutterBtn.classList.add('recording');
  statusEl.classList.add('recording');
  statusEl.textContent = 'Gravando...';
  animateRing();

  recordTimeout = setTimeout(() => {
    if (isRecording) stopRecording();
  }, MAX_DURATION_MS);
}

function stopRecording() {
  if (!isRecording) return;
  isRecording = false;
  clearTimeout(recordTimeout);
  shutterBtn.classList.remove('recording');
  ringProgress.style.strokeDashoffset = 226;
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
}

function animateRing() {
  if (!isRecording) return;
  const elapsed = performance.now() - recordStartTime;
  const pct = Math.min(elapsed / MAX_DURATION_MS, 1);
  ringProgress.style.strokeDashoffset = 226 - (226 * pct);
  const secondsLeft = Math.max(0, Math.ceil((MAX_DURATION_MS - elapsed) / 1000));
  statusEl.textContent = `Gravando... ${secondsLeft}s`;
  if (pct >= 1) return;
  requestAnimationFrame(animateRing);
}

// ---------- Gestos: toque = foto, segurar = vídeo ----------
function onPressStart(e) {
  e.preventDefault();
  if (holdTimer || isRecording) return; // evita disparo duplicado
  holdTimer = setTimeout(() => {
    holdTimer = null;
    startRecording();
  }, HOLD_THRESHOLD_MS);
}

function onPressEnd(e) {
  if (holdTimer) {
    clearTimeout(holdTimer);
    holdTimer = null;
    takePhoto();
  } else if (isRecording) {
    stopRecording();
  }
}

shutterBtn.addEventListener('pointerdown', onPressStart);
shutterBtn.addEventListener('pointerup', onPressEnd);
shutterBtn.addEventListener('pointerleave', onPressEnd);
shutterBtn.addEventListener('pointercancel', onPressEnd);
shutterBtn.addEventListener('contextmenu', (e) => e.preventDefault());

// ---------- Retake / Download / Share ----------
retakeBtn.onclick = () => {
  resultImg.style.display = 'none';
  resultVideo.pause();
  resultVideo.style.display = 'none';
  video.style.display = 'block';
  frameImg.style.display = 'block';
  controls.style.display = 'flex';
  resultControls.style.display = 'none';
};

downloadBtn.onclick = () => {
  if (!capturedBlob) return;
  const ext = capturedType === 'video' ? (capturedBlob.type.includes('mp4') ? 'mp4' : 'webm') : 'png';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(capturedBlob);
  a.download = `bodas-de-ouro-maria-lucia-joao.${ext}`;
  a.click();
};

shareBtn.onclick = async () => {
  if (!capturedBlob) return;
  const ext = capturedType === 'video' ? (capturedBlob.type.includes('mp4') ? 'mp4' : 'webm') : 'png';
  const file = new File([capturedBlob], `bodas-de-ouro.${ext}`, { type: capturedBlob.type });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({
        files: [file],
        title: 'Bodas de Ouro — Maria Lúcia & João',
        text: '50 anos de amor! 18.07.2026'
      });
    } catch (err) {
      // usuário cancelou ou erro — sem ação necessária
    }
  } else {
    downloadBtn.click();
    alert('Compartilhamento direto não é suportado neste navegador. O arquivo foi baixado — anexe manualmente no Instagram.');
  }
};

// Autoplay start attempt (many mobile browsers still require the tap on enableCamBtn)
startCamera(currentFacing);
</script>

</body>
</html>
