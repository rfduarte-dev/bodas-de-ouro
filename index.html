<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Bodas de Ouro — Maria Lúcia & João</title>
<style>
  :root{
    --gold: #d4af6a;
    --gold-light: #f0d9a8;
    --bg: #0a0a08;
  }
  * { box-sizing: border-box; margin:0; padding:0; }
  html, body {
    height: 100%;
    background: var(--bg);
    font-family: Georgia, 'Times New Roman', serif;
    color: var(--gold-light);
    overflow: hidden;
  }
  body {
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }
  #stage {
    position: relative;
    width: 100vw;
    max-width: 480px;
    height: 100vh;
    max-height: 853px;
    aspect-ratio: 9/16;
    background:#000;
    overflow:hidden;
  }
  #video, #resultImg {
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    object-fit: cover;
    background:#000;
  }
  #resultImg { display:none; }
  #frameOverlay {
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    pointer-events:none;
    z-index: 5;
  }
  #topBar {
    position:absolute;
    top: max(14px, env(safe-area-inset-top));
    left:0; right:0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding: 0 16px;
    z-index: 10;
  }
  #status {
    font-size: 12px;
    letter-spacing: 0.05em;
    color: var(--gold);
    background: rgba(0,0,0,0.5);
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid rgba(212,175,106,0.4);
  }
  #flipBtn {
    width:38px; height:38px;
    border-radius:50%;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(212,175,106,0.4);
    color: var(--gold);
    font-size: 18px;
    display:flex; align-items:center; justify-content:center;
  }
  #controls {
    position:absolute;
    bottom: max(28px, env(safe-area-inset-bottom));
    left:0; right:0;
    display:flex;
    justify-content:center;
    align-items:center;
    gap: 28px;
    z-index: 10;
  }
  #shutterBtn {
    width:72px; height:72px;
    border-radius:50%;
    background: transparent;
    border: 4px solid var(--gold);
    position:relative;
  }
  #shutterBtn::after{
    content:'';
    position:absolute;
    inset:6px;
    border-radius:50%;
    background: var(--gold-light);
  }
  #shutterBtn:active::after{ background: var(--gold); }

  #resultControls {
    position:absolute;
    bottom: max(28px, env(safe-area-inset-bottom));
    left:0; right:0;
    display:none;
    justify-content:center;
    gap: 16px;
    z-index: 10;
    padding: 0 24px;
  }
  .pillBtn {
    flex:1;
    max-width: 160px;
    padding: 14px 10px;
    border-radius: 30px;
    border: 1px solid var(--gold);
    background: rgba(0,0,0,0.55);
    color: var(--gold-light);
    font-size: 14px;
    letter-spacing: 0.03em;
    text-align:center;
    font-family: Georgia, serif;
  }
  .pillBtn.primary {
    background: var(--gold);
    color: #1a1400;
    font-weight: bold;
  }
  #permissionMsg {
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding: 40px;
    font-size: 15px;
    line-height:1.6;
    z-index: 20;
    background: var(--bg);
  }
  canvas { display:none; }
</style>
</head>
<body>

<div id="stage">
  <video id="video" autoplay playsinline muted></video>
  <img id="resultImg" alt="Foto capturada">
  <img id="frameOverlay" src="frame.webp" alt="Moldura Bodas de Ouro">

  <div id="topBar">
    <div id="status">Bodas de Ouro · 18.07.2026</div>
    <button id="flipBtn" title="Trocar câmera">⟳</button>
  </div>

  <div id="controls">
    <button id="shutterBtn" title="Capturar foto"></button>
  </div>

  <div id="resultControls">
    <button class="pillBtn" id="retakeBtn">Refazer</button>
    <button class="pillBtn primary" id="shareBtn">Compartilhar</button>
    <button class="pillBtn" id="downloadBtn">Baixar</button>
  </div>

  <div id="permissionMsg">
    Toque no botão abaixo para ativar a câmera e usar a moldura.
    <br><br>
    <button class="pillBtn primary" id="enableCamBtn" style="max-width:220px;margin-top:10px;">Ativar câmera</button>
  </div>
</div>

<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const resultImg = document.getElementById('resultImg');
const canvas = document.getElementById('canvas');
const shutterBtn = document.getElementById('shutterBtn');
const controls = document.getElementById('controls');
const resultControls = document.getElementById('resultControls');
const retakeBtn = document.getElementById('retakeBtn');
const shareBtn = document.getElementById('shareBtn');
const downloadBtn = document.getElementById('downloadBtn');
const flipBtn = document.getElementById('flipBtn');
const permissionMsg = document.getElementById('permissionMsg');
const enableCamBtn = document.getElementById('enableCamBtn');

let currentFacing = 'user'; // selfie por padrão, troque para 'environment' se preferir
let stream = null;
let capturedBlob = null;

async function startCamera(facing) {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
  }
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: facing,
        width: { ideal: 3840 },
        height: { ideal: 2160 }
      },
      audio: false
    });
    video.srcObject = stream;
    video.style.transform = facing === 'user' ? 'scaleX(-1)' : 'none';
    permissionMsg.style.display = 'none';

    // Reseta zoom digital/óptico para 1x quando o dispositivo permite
    const track = stream.getVideoTracks()[0];
    const capabilities = track.getCapabilities ? track.getCapabilities() : {};
    if (capabilities.zoom) {
      try {
        await track.applyConstraints({ advanced: [{ zoom: capabilities.zoom.min }] });
      } catch (e) { /* alguns navegadores não suportam ajustar, ignora */ }
    }
  } catch (err) {
    permissionMsg.innerHTML = 'Não foi possível acessar a câmera.<br><br>Verifique as permissões do navegador e tente novamente.<br><br><button class="pillBtn primary" id="retryBtn" style="max-width:220px;margin-top:10px;">Tentar novamente</button>';
    permissionMsg.style.display = 'flex';
    document.getElementById('retryBtn').onclick = () => startCamera(currentFacing);
  }
}

enableCamBtn.onclick = () => startCamera(currentFacing);

flipBtn.onclick = () => {
  currentFacing = currentFacing === 'user' ? 'environment' : 'user';
  startCamera(currentFacing);
};

shutterBtn.onclick = () => {
  const stageRect = document.getElementById('stage').getBoundingClientRect();
  const targetW = 1080, targetH = 1920;
  canvas.width = targetW;
  canvas.height = targetH;
  const ctx = canvas.getContext('2d');

  // cover-fit: preenche o quadro inteiro (topo e base encostados), com corte mínimo nas laterais
  const vw = video.videoWidth, vh = video.videoHeight;
  const videoRatio = vw / vh;
  const targetRatio = targetW / targetH;
  let sx, sy, sw, sh;
  if (videoRatio > targetRatio) {
    sh = vh;
    sw = vh * targetRatio;
    sx = (vw - sw) / 2;
    sy = 0;
  } else {
    sw = vw;
    sh = vw / targetRatio;
    sx = 0;
    sy = (vh - sh) / 2;
  }

  // mirror if front camera (selfie), so it doesn't look flipped-weird
  if (currentFacing === 'user') {
    ctx.translate(targetW, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, targetW, targetH);
    ctx.setTransform(1,0,0,1,0,0);
  } else {
    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, targetW, targetH);
  }

  const frameImg = document.getElementById('frameOverlay');
  ctx.drawImage(frameImg, 0, 0, targetW, targetH);

  canvas.toBlob((blob) => {
    capturedBlob = blob;
    const url = URL.createObjectURL(blob);
    resultImg.src = url;
    resultImg.style.display = 'block';
    video.style.display = 'none';
    controls.style.display = 'none';
    resultControls.style.display = 'flex';
  }, 'image/png', 0.95);
};

retakeBtn.onclick = () => {
  resultImg.style.display = 'none';
  video.style.display = 'block';
  controls.style.display = 'flex';
  resultControls.style.display = 'none';
};

downloadBtn.onclick = () => {
  if (!capturedBlob) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(capturedBlob);
  a.download = 'bodas-de-ouro-maria-lucia-joao.png';
  a.click();
};

shareBtn.onclick = async () => {
  if (!capturedBlob) return;
  const file = new File([capturedBlob], 'bodas-de-ouro.png', { type: 'image/png' });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({
        files: [file],
        title: 'Bodas de Ouro — Maria Lúcia & João',
        text: '50 anos de amor! 18.07.2026'
      });
    } catch (err) {
      // usuário cancelou ou erro — sem ação necessária
    }
  } else {
    downloadBtn.click();
    alert('Compartilhamento direto não é suportado neste navegador. A imagem foi baixada — anexe manualmente no Instagram.');
  }
};

// Autoplay start attempt (many mobile browsers still require the tap on enableCamBtn)
startCamera(currentFacing);
</script>

</body>
</html>
